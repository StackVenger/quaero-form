name: CI Pipeline

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main
      - 'feature/**'

jobs:
  pre-commit-checks:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history for commitlint

      # 2. Setup Node.js environment
      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. Install dependencies
      - run: npm ci

      # 4. Run Biome linting & formatting checks
      - name: Run Biome checks
        run: npx biome ci

      # 5. Validate commit messages using Commitlint (Commitizen style)
      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v5
        with:
          configFile: commitlint.config.cjs
          firstParent: true  # Only check commits in this push, not entire history